<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Orientation — Aurora</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            /* Restoring base clock-size to 75vmin to keep internal JS radius ratios correct */
            --clock-size: 75vmin;
            --label-size: 8vmin;
            --reality-ease: cubic-bezier(0.16, 1, 0.3, 1);
            /* Dynamic Time Colors — driven by JS */
            --face-center: #1a1a24;
            --face-edge: #050508;
            /* Glow colors — driven by JS from palette text colors */
        }
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        /* Separate container to cast the drop shadow without being clipped by the WebKit backdrop-filter bug */
        #clock-shadow {
            position: absolute;
            width: var(--clock-size);
            height: var(--clock-size);
            border-radius: 50%;
            box-shadow:
                /* Negative spread pulls shadow start inside the edge — no visible ring */
                0 0 20vmin -3vmin rgba(0, 0, 0, 0.22);
            transform: scale(1) translateZ(0);
            transition: box-shadow 1s linear;
        }
        /* iOS Vibrant Liquid Glass Bezel — 3D raised convex glass */
        #clock-bezel {
            width: var(--clock-size);
            height: var(--clock-size);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            padding: 2vmin;
            background: color-mix(in srgb, var(--next-accent, rgba(255, 255, 255, 1)) 15%, rgba(255, 255, 255, 0.25));
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            box-shadow:
                /* Fine bright edge at very top of the rim — primary specular hit */
                inset 0.1vmin 0.1vmin 0.2vmin rgba(255, 255, 255, 1),
                /* Broad top-left highlight — convex glass catching light */
                inset 0.6vmin 0.6vmin 2vmin rgba(255, 255, 255, 0.85),
                /* Mid-tone bounce fill tinted by accent */
                inset 1.5vmin 1.5vmin 4.5vmin color-mix(in srgb, var(--next-accent, rgba(255, 255, 255, 1)) 22%, rgba(255, 255, 255, 0.35)),
                /* Bottom-right counter-shadow — opposite side of the raised glass */
                inset -0.6vmin -0.6vmin 2vmin rgba(0, 0, 0, 0.18),
                /* Deep inner rim darkening for glass thickness illusion */
                inset -1.2vmin -1.2vmin 4vmin rgba(0, 0, 0, 0.12);
            /* Lighter, thinner border for a more premium glass edge */
            border: 0.10vmin solid color-mix(in srgb, var(--current-accent, rgba(0, 0, 0, 1)) 15%, rgba(0, 0, 0, 0.15));
            transform: scale(1) translateZ(0);
            transition: background 3s ease-in-out, border 3s ease-in-out, box-shadow 3s ease-in-out;
        }
        /* Color-shifting radial face — from design 3 */
        #clock-face {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--face-center) 0%, var(--face-edge) 100%);
            box-shadow:
                inset 0 0 4vmin rgba(255, 255, 255, 0.06),
                inset 2vmin 2vmin 5vmin rgba(0, 0, 0, 0.2);
            transition: background 3s ease-in-out;
            overflow: hidden;
        }
        /* Iridescent interference shimmer — from design 4 */
        #clock-face::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 180deg at 40% 60%,
                    rgba(255, 100, 150, 0.05),
                    rgba(80, 200, 255, 0.05),
                    rgba(150, 255, 180, 0.03),
                    rgba(255, 220, 80, 0.04),
                    rgba(180, 80, 255, 0.05),
                    rgba(255, 100, 150, 0.05));
            animation: shimmer-drift 12s ease-in-out infinite alternate;
            mix-blend-mode: screen;
            pointer-events: none;
        }
        @keyframes shimmer-drift {
            from {
                transform: rotate(0deg) scale(1);
                opacity: 0.5;
            }
            to {
                transform: rotate(60deg) scale(1.05);
                opacity: 1;
            }
        }
        /* Viscous Trail Elements */
        .trail {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: var(--label-size);
            white-space: nowrap;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            width: 20vmin;
            height: 10vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 3s ease, color 3s ease;
            filter: blur(1.5px);
        }
        .is-h-drifting .h-trail,
        .is-m-drifting .m-trail {
            opacity: 0.18;
            transition: opacity 0.5s ease;
        }
        /* Trails — color and text-shadow applied dynamically by JS */
        .h-trail {
            font-weight: 500;
            font-size: calc(var(--label-size) * 1.15);
        }
        .m-trail {
            font-weight: 200;
        }
        /* Labels with holographic chromatic aberration — from design 4 */
        .label {
            position: absolute;
            top: 50%;
            left: 50%;
            transition: opacity 3s ease, filter 3s ease, color 3s ease-in-out;
            font-size: var(--label-size);
            white-space: nowrap;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            width: 20vmin;
            height: 12vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.05em;
            transform: translate(-50%, -50%);
        }
        .hour-label {
            font-weight: 500;
            font-size: calc(var(--label-size) * 1.15);
            z-index: 12;
            /* color and text-shadow applied dynamically by JS */
        }
        .minute-label {
            font-weight: 200;
            z-index: 11;
            opacity: 0.9;
            /* color and text-shadow applied dynamically by JS */
        }
        /* Ghosting Effect during Drift */
        .is-h-drifting .hour-label,
        .is-m-drifting .minute-label {
            opacity: 0.12;
            filter: blur(4px);
            transition: opacity 3s ease, filter 3s ease;
        }
        .is-h-drifting .hand.hour,
        .is-m-drifting .hand.minute {
            opacity: 0.12;
            filter: blur(3px);
            transition: opacity 3s ease, filter 3s ease;
        }
        /* Laser beam hands — from design 4, colors adapt to time of day */
        .hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform-origin: 50% 100%;
            border-radius: 10vmin;
            z-index: 100;
            transition: opacity 3s ease, filter 3s ease, background 3s ease-in-out, box-shadow 3s ease-in-out;
        }
        .hand.hour {
            width: 0.5vmin;
            height: 21vmin;
            /* background and box-shadow applied dynamically by JS */
            z-index: 101;
        }
        .hand.minute {
            width: 0.35vmin;
            height: 34vmin;
            /* background and box-shadow applied dynamically by JS */
            opacity: 0.9;
            z-index: 100;
        }
        .hand.second {
            width: 0.2vmin;
            height: 34.8vmin;
            background: linear-gradient(to top,
                    rgba(255, 80, 120, 0) 0%,
                    rgba(255, 80, 120, 0.7) 30%,
                    rgba(255, 160, 180, 1) 100%);
            z-index: 150;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            box-shadow:
                0 0 0.4vmin rgba(255, 100, 140, 0.9),
                0 0 1.5vmin rgba(255, 60, 100, 0.5),
                0 0 4vmin rgba(255, 40, 80, 0.2);
        }
        /* Glass center pin — mirrors the face color, lighter and translucent */
        #clock-bezel::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2vmin;
            height: 2vmin;
            /* Subtle lighter version of the face center — barely-there glass */
            background: radial-gradient(circle at 35% 30%,
                    color-mix(in srgb, white 22%, var(--face-center) 78%),
                    color-mix(in srgb, white 8%, var(--face-center) 92%));
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            transition: background 7s ease;
            box-shadow:
                /* Subtle inner specular — gentle glass edge */
                inset 0.1vmin 0.1vmin 0.3vmin rgba(255, 255, 255, 0.3),
                inset -0.05vmin -0.05vmin 0.2vmin rgba(0, 0, 0, 0.1),
                /* Very soft outer glow — barely visible */
                0 0 0.3vmin rgba(255, 255, 255, 0.2),
                0 0 1.5vmin color-mix(in srgb, var(--current-accent, white) 15%, transparent);
        }
        #version-tag {
            position: fixed;
            top: 4vmin;
            right: 4vmin;
            font-family: 'Inter', sans-serif;
            font-size: 1.2vmin;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            z-index: 2000;
        }
        #version-tag {
            position: fixed;
            top: 4vmin;
            right: 4vmin;
            font-family: 'Inter', sans-serif;
            font-size: 1.2vmin;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            z-index: 2000;
        }
        /* Demo time label — shows current simulated hour during dwell */
        #demo-time-label {
            position: fixed;
            bottom: 9vmin;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-size: 1.4vmin;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            user-select: none;
            z-index: 2000;
        }
        #demo-description {
            position: fixed;
            bottom: 2.5vmin;
            left: 50%;
            transform: translateX(-50%);
            width: 65vmin;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 1.1vmin;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.8s ease 0.2s;
            pointer-events: none;
            user-select: none;
            z-index: 2000;
        }
        .is-demo-active #demo-time-label,
        .is-demo-active #demo-description {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="version-tag"></div>
    <div id="clock-shadow"></div>
    <div id="demo-time-label"></div>
    <div id="demo-description">
        This version demonstrates the color shifts of the clock face, hands, and minute reference points across the 24
        hour cycle.
    </div>
    <div id="clock-bezel">
        <div id="clock-face">
            <!-- Viscous Trails -->
            <div id="h-trail-2" class="trail h-trail trail-2"></div>
            <div id="h-trail-1" class="trail h-trail trail-1"></div>
            <div id="m-trail-2" class="trail m-trail trail-2"></div>
            <div id="m-trail-1" class="trail m-trail trail-1"></div>
            <!-- Main Labels -->
            <div id="h-label" class="label hour-label"></div>
            <div id="m-label" class="label minute-label"></div>
            <div class="hand hour"></div>
            <div class="hand minute"></div>
            <div class="hand second"></div>
        </div>
    </div>
    <script>
        // Full 24-hour color palette — from design 3 (restored text colors)
        const timePalettes = [
            { center: '#14184a', edge: '#060a28', text: '#88aaff' }, // 0: Midnight — deep navy
            { center: '#161a52', edge: '#060a28', text: '#9099ff' }, // 1: Night
            { center: '#1a1e60', edge: '#060e32', text: '#9999ff' }, // 2: Night
            { center: '#202672', edge: '#081240', text: '#a0aaff' }, // 3: Night
            { center: '#283285', edge: '#0a1a50', text: '#b0bbff' }, // 4: Pre-dawn
            { center: '#4b3f90', edge: '#1a154a', text: '#c0b8ff' }, // 5: Dawn — violet/lavender
            { center: '#e0a3c2', edge: '#3d2b7c', text: '#2a1a2a' }, // 6: Sunrise — blush/violet (Reference)
            { center: '#fff4e6', edge: '#fbc9a4', text: '#3a2a1a' }, // 7: Morning Golden Hour Peak — Peach/Amber
            { center: '#fff9e6', edge: '#fde8c5', text: '#4a3a2a' }, // 8: Morning Golden Hour — Honey Glow
            { center: '#e0f2ff', edge: '#f4c2d3', text: '#1a2b3c' }, // 9: Mid-Morning — sky/blush
            { center: '#bde2fd', edge: '#65a5d2', text: '#082038' }, // 10: Late Morning
            { center: '#e4f3ff', edge: '#81bdea', text: '#061b36' }, // 11: Noon roughly
            { center: '#ffffff', edge: '#a4cdef', text: '#051832' }, // 12: Noon — brightest white-blue
            { center: '#f5fbff', edge: '#8bbfe5', text: '#071c3a' }, // 13: Midday
            { center: '#eaf4fc', edge: '#76b1db', text: '#092144' }, // 14: Afternoon
            { center: '#f0f7fb', edge: '#9ebccf', text: '#1a2b44' }, // 15: Afternoon
            { center: '#fffcf5', edge: '#e8ecef', text: '#3e4a5d' }, // 16: Late Afternoon — Warm Cream
            { center: '#fff9e6', edge: '#fde8c5', text: '#4a3a2a' }, // 17: Golden Hour — Honey Glow
            { center: '#fff4e6', edge: '#fbc9a4', text: '#3a2a1a' }, // 18: Sunset Peak — Peach / Copper Amber
            { center: '#9153a1', edge: '#4a2c5a', text: '#f0f0f0' }, // 19: Post-Sunset — Deep Rose / Violet
            { center: '#2e3880', edge: '#121858', text: '#b0c8ff' }, // 20: Blue Hour
            { center: '#252a68', edge: '#0e1040', text: '#aab8ff' }, // 21: Night
            { center: '#201e58', edge: '#0c0a32', text: '#a8a8ff' }, // 22: Night
            { center: '#1e1c50', edge: '#0a0828', text: '#b0aaff' }  // 23: Night
        ];
        let lastMilestone = -1;
        let lastSecond = -1;
        let rotS = 0;
        let currentDemoH = 0; // controlled by runDemoStep() state machine
        window.isDemoActive = false; // flag to switch between real-time and demo
        let hTargetX = 0, hTargetY = 0;
        let mTargetX = 0, mTargetY = 0;
        const RADIUS = 28.5;
        function getSafeXY(fixedX, fixedY, attempt = 0) {
            // Pick a random point on the circle
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * RADIUS;
            const y = Math.sin(angle) * RADIUS;
            // Check distance from the fixed point
            const dist = Math.sqrt((x - fixedX) ** 2 + (y - fixedY) ** 2);
            // If too close, try again (up to 10 times to avoid infinite recursion)
            if (dist < 26 && attempt < 10) {
                return getSafeXY(fixedX, fixedY, attempt + 1);
            }
            return { x, y };
        }
        function shiftReality() {
            // Initial placement only — demo loop drives all subsequent drifts
            const hAngle = Math.random() * Math.PI * 2;
            const newHTargetX = Math.cos(hAngle) * RADIUS;
            const newHTargetY = Math.sin(hAngle) * RADIUS;
            const mPos = getSafeXY(newHTargetX, newHTargetY);
            hTargetX = newHTargetX;
            hTargetY = newHTargetY;
            mTargetX = mPos.x;
            mTargetY = mPos.y;
        }
        // Logic to trigger a drift for a specific hand (hour or minute)
        function triggerHandDrift(type) {
            const isH = type === 'hour';
            const driftingClass = isH ? 'is-h-drifting' : 'is-m-drifting';
            // 1. Ghost out
            document.body.classList.add(driftingClass);
            // 2. Wait for ghosting to peak (1.5s), then update target
            setTimeout(() => {
                // Ensure we don't land on top of the other hand
                const otherX = isH ? mTargetX : hTargetX;
                const otherY = isH ? mTargetY : hTargetY;
                const pos = getSafeXY(otherX, otherY);
                if (isH) {
                    hTargetX = pos.x;
                    hTargetY = pos.y;
                } else {
                    mTargetX = pos.x;
                    mTargetY = pos.y;
                }
            }, 1600);
            // 3. Keep ghosted while "sailing" to new spot 
            // (The sweep speed 0.015 takes roughly 5-6s to settle)
            setTimeout(() => {
                document.body.classList.remove(driftingClass);
            }, 6500);
        }
        /**
         * Approximates sunrise and sunset hours based on the day of the year.
         * Modeled for ~40°N latitude (standard mid-latitude).
         * Summer Solstice (Jun 21): Sunrise 5:30 AM, Sunset 8:30 PM (20.5)
         * Winter Solstice (Dec 21): Sunrise 7:30 AM, Sunset 4:30 PM (16.5)
         */
        function getSolarAnchors() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);
            // Peaks at 1 on Summer Solstice (day 172), -1 on Winter Solstice (day 355)
            const seasonalOscillator = Math.cos((dayOfYear - 172) * 2 * Math.PI / 365.25);
            // Summer (osc=1): Sunrise 5:30, Sunset 20:30
            // Winter (osc=-1): Sunrise 7:30, Sunset 16:30
            const sunrise = 6.5 - seasonalOscillator * 1.0;
            const sunset = 18.5 + seasonalOscillator * 2.0;
            const solarNoon = (sunrise + sunset) / 2;
            return { sunrise, sunset, solarNoon };
        }
        /**
         * Helper to blend two hex colors
         */
        function lerpColor(c1, c2, p) {
            const r1 = parseInt(c1.slice(1, 3), 16);
            const g1 = parseInt(c1.slice(3, 5), 16);
            const b1 = parseInt(c1.slice(5, 7), 16);
            const r2 = parseInt(c2.slice(1, 3), 16);
            const g2 = parseInt(c2.slice(3, 5), 16);
            const b2 = parseInt(c2.slice(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * p);
            const g = Math.round(g1 + (g2 - g1) * p);
            const b = Math.round(b1 + (b2 - b1) * p);
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }
        /**
         * Maps real local time [0-24] to a "virtual solar hour" [0-24].
         * Virtual 6 is always Sunrise.
         * Virtual 12 is always Solar Noon.
         * Virtual 18 is always Sunset.
         */
        function getVirtualSolarHour(realH, realM, realS) {
            const time = realH + realM / 60 + realS / 3600;
            const { sunrise, sunset, solarNoon } = getSolarAnchors();
            if (time < sunrise) {
                // Pre-dawn: [0 to Sunrise] -> [0 to 6]
                return (time / sunrise) * 6;
            } else if (time < solarNoon) {
                // Morning: [Sunrise to Noon] -> [6 to 12]
                return 6 + ((time - sunrise) / (solarNoon - sunrise)) * 6;
            } else if (time < sunset) {
                // Afternoon: [Noon to Sunset] -> [12 to 18]
                return 12 + ((time - solarNoon) / (sunset - solarNoon)) * 6;
            } else {
                // Night: [Sunset to 24] -> [18 to 24]
                return 18 + ((time - sunset) / (24 - sunset)) * 6;
            }
        }
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }
        // Convert RGB to HSL
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }
        // Build a Golden (45°) glow-only text-shadow for the background layer.
        function vibrantGlowShadow(textHex, isHour) {
            // Force the glow to a clean, premium Gold/Amber (45°)
            const baseHue = 45;
            const bloomL = isHour ? 85 : 80;
            if (isHour) {
                return [
                    `0 0 8px  6px hsl(${baseHue}, 100%, ${bloomL}%, 0.8)`,
                    `0 0 20px 10px hsl(${baseHue}, 100%, 65%, 0.5)`,
                    `0 0 45px 15px hsl(${baseHue}, 100%, 55%, 0.2)`
                ].join(', ');
            } else {
                return [
                    `0 0 6px  4px hsl(${baseHue}, 100%, ${bloomL}%, 0.7)`,
                    `0 0 16px 8px hsl(${baseHue}, 100%, 60%, 0.4)`,
                    `0 0 32px 12px hsl(${baseHue}, 100%, 50%, 0.1)`
                ].join(', ');
            }
        }
        // Compute the desaturated Sky Blue (200°) or White color for the front-row labels.
        function vibrantLabelColor(textHex, isHour, faceCenterHex) {
            // Force main labels to a crisp, desaturated Sky Blue (200°)
            const baseHue = 200;
            // Check face brightness
            const fc = hexToRgb(faceCenterHex);
            const faceLum = (fc.r * 0.299 + fc.g * 0.587 + fc.b * 0.114) / 255;
            const isLightFace = faceLum > 0.45;
            // Maintain high contrast vs face, but prioritize an "Airy White" feel
            const l = !isLightFace
                ? (isHour ? 95 : 90)
                : faceLum > 0.80
                    ? (isHour ? 60 : 54)
                    : (isHour ? 50 : 54);
            return `hsl(${baseHue}, 40%, ${l}%)`; // Saturated at 40% for "Sky" feel
        }
        // Trail shadow — Golden (45°) soft bloom
        function vibrantTrailShadow(textHex, isHour) {
            const baseHue = 45;
            const a = isHour ? 0.6 : 0.4;
            return [
                `0 0 6px  hsl(${baseHue}, 100%, 80%, ${a})`,
                `0 0 14px hsl(${baseHue}, 100%, 65%, ${a * 0.6})`
            ].join(', ');
        }
        // Apply palette-driven colors to all three hands each frame.
        // Hour hand: hue from the palette edge color (deep, rich)
        // Minute hand: ~150° complement so it always contrasts the hour hand
        // Second hand: ~210° further complement (stays in the warm-to-cool spectrum)
        function applyHandColors(edgeHex, centerHex) {
            // Derive hue from face CENTER so complements are always truly different
            const { r: cr, g: cg, b: cb } = hexToRgb(centerHex);
            const { h: cH, s: cS } = rgbToHsl(cr, cg, cb);
            const faceHue = cS < 5 ? 250 : cH;
            // 180° complement for hour, 270° for minute — always visually distinct
            let hourHue = (faceHue + 180) % 360;
            let minuteHue = (faceHue + 270) % 360;
            // Face luminance
            const faceLum = (cr * 0.299 + cg * 0.587 + cb * 0.114) / 255;
            const isLightFace = faceLum > 0.40;
            if (isLightFace) {
                // Hour hand: Shift from dark blues to a soft, airy Purple/Lavender (265°)
                if (hourHue >= 10 && hourHue <= 160) hourHue = 210;
                else if (hourHue > 160 && hourHue <= 240) hourHue = 220;
                // Force minute hand to a crisp Sky Blue (200°) to match common sky tones
                // and skip the muddier/purpler complements during Golden Hour.
                if (minuteHue > 240 || minuteHue < 180) {
                    minuteHue = 200;
                }
            }
            // Light faces: scale hand lightness with face brightness
            // Increased lightness significantly (55-40) and reduced saturation (45%)
            // to avoid "high chroma" and "dark ends" feel.
            const s = isLightFace ? '45%' : '100% ';
            const lightTipL = faceLum > 0.80 ? 55 : 45;
            const lightMidL = faceLum > 0.80 ? 48 : 40;
            const lightBaseL = faceLum > 0.80 ? 40 : 35;
            const tipL = isLightFace ? lightTipL : 85;
            const midL = isLightFace ? lightMidL : 65;
            const baseL = isLightFace ? lightBaseL : 50;
            const glowA = isLightFace ? 0.8 : 0.9;
            const hourW = isLightFace ? '0.65vmin' : '0.5vmin';
            const minuteW = isLightFace ? '0.5vmin' : '0.35vmin';
            const hourHand = document.querySelector('.hand.hour');
            const minuteHand = document.querySelector('.hand.minute');
            hourHand.style.width = hourW;
            minuteHand.style.width = minuteW;
            // Hour hand gradient + glow
            hourHand.style.background = `linear-gradient(to top,
                hsl(${hourHue}, ${s}, ${midL}%, 0.4) 0%,
                hsl(${hourHue}, ${s}, ${midL}%, 0.8) 40%,
                hsl(${hourHue}, ${s}, ${tipL}%, 1) 100%)`;
            hourHand.style.boxShadow = [
                `0 0 0.4vmin hsl(${hourHue}, ${s}, ${tipL}%, ${glowA})`,
                `0 0 1.5vmin hsl(${hourHue}, ${s}, ${midL}%, ${glowA * 0.55})`,
                `0 0 4vmin   hsl(${hourHue}, ${s}, ${baseL}%, ${glowA * 0.25})`
            ].join(', ');
            // Minute hand gradient + glow
            minuteHand.style.background = `linear-gradient(to top,
                hsl(${minuteHue}, ${s}, ${midL}%, 0.4) 0%,
                hsl(${minuteHue}, ${s}, ${midL}%, 0.8) 40%,
                hsl(${minuteHue}, ${s}, ${tipL}%, 1) 100%)`;
            minuteHand.style.boxShadow = [
                `0 0 0.4vmin hsl(${minuteHue}, ${s}, ${tipL}%, ${glowA})`,
                `0 0 1.5vmin hsl(${minuteHue}, ${s}, ${midL}%, ${glowA * 0.55})`,
                `0 0 4vmin   hsl(${minuteHue}, ${s}, ${baseL}%, ${glowA * 0.2})`
            ].join(', ');
            // Second hand stays constant vibrant red
        }
        function update() {
            const now = new Date();
            const isDemo = window.isDemoActive || false;
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            let effectiveH = h;
            let effectiveM = m - 3; // Lag for physical labels
            if (effectiveM < 0) {
                effectiveM += 60;
                effectiveH -= 1;
            }
            if (effectiveH < 0) {
                effectiveH += 24;
            }
            const mMilestone = Math.floor(effectiveM / 5) * 5;
            // Generate the strings for what the labels should ACTUALLY say
            let displayH, displayM;
            if (isDemo && typeof currentDemoH !== 'undefined') {
                // In demo mode, the text shows the demo time exactly
                let demoH = Math.floor(currentDemoH);
                let demoM = (currentDemoH % 1) * 60;
                let demoMilestone = Math.floor(demoM / 5) * 5;
                displayH = demoH % 12 || 12;
                displayM = String(demoMilestone);
                if (demoMilestone === 5) displayM = '05';
                if (demoMilestone === 0) displayM = '0';
            } else {
                // In normal mode, it shows the physical real time
                displayH = effectiveH % 12 || 12;
                displayM = String(mMilestone);
                if (mMilestone === 5) displayM = '05';
                if (mMilestone === 0) displayM = '0';
            }
            const hLabelEl = document.getElementById('h-label');
            const mLabelEl = document.getElementById('m-label');
            const trailsH = document.querySelectorAll('.h-trail');
            const trailsM = document.querySelectorAll('.m-trail');
            if (hLabelEl.textContent !== String(displayH)) {
                hLabelEl.textContent = displayH;
                trailsH.forEach(t => t.textContent = displayH);
            }
            if (mMilestone !== lastMilestone || mLabelEl.textContent !== displayM) {
                lastMilestone = mMilestone;
                mLabelEl.textContent = displayM;
                trailsM.forEach(t => t.textContent = displayM);
            }
            const finalBaseHAngle = Math.atan2(hTargetY, hTargetX) * 180 / Math.PI + 90;
            const finalBaseMAngle = Math.atan2(mTargetY, mTargetX) * 180 / Math.PI + 90;
            const hOffset = (m / 60) * 30 + (s / 3600) * 30;
            const mOffset = (m - mMilestone) * 6 + (s / 60) * 6; // Real physical offset
            let targetH = finalBaseHAngle + hOffset;
            let targetM = finalBaseMAngle + mOffset;
            // ─── Color logic ───
            // If in demo mode, currentDemoH is controlled by the state machine.
            // If not in demo mode, we calculate it based on seasonal solar logic.
            let solarH;
            if (window.isDemoActive) {
                solarH = currentDemoH;
            } else {
                solarH = getVirtualSolarHour(h, m, s);
            }
            const currentIdx = Math.floor(solarH) % 24;
            const nextIdx = (currentIdx + 1) % 24;
            const progress = solarH % 1;
            const cp = timePalettes[currentIdx];
            const np = timePalettes[nextIdx];
            // ─── Continuous color blending for production ───
            const interpolatedCenter = lerpColor(cp.center, np.center, progress);
            const interpolatedEdge = lerpColor(cp.edge, np.edge, progress);
            const interpolatedText = lerpColor(cp.text, np.text, progress);
            document.documentElement.style.setProperty('--face-center', interpolatedCenter);
            document.documentElement.style.setProperty('--face-edge', interpolatedEdge);
            document.documentElement.style.setProperty('--current-accent', interpolatedText);
            document.documentElement.style.setProperty('--next-accent', np.text);
            // ─── Vibrant label glows from interpolated text color ───
            const textRgb = interpolatedText; // lerpColor returns rgb() string
            // Refactor vibrant functions to handle rgb() or hex
            const getColorSource = (c) => c;
            const hColor = vibrantLabelColor(interpolatedText, true, interpolatedCenter);
            const mColor = vibrantLabelColor(interpolatedText, false, interpolatedCenter);
            const hGlow = vibrantGlowShadow(interpolatedText, true);
            const mGlow = vibrantGlowShadow(interpolatedText, false);
            const trailShadow = vibrantTrailShadow(interpolatedText, true);
            const mTrailShadow = vibrantTrailShadow(interpolatedText, false);
            // Solid color = crisp letterforms; text-shadow = glow bloom on top
            const hLabel = document.getElementById('h-label');
            const mLabel = document.getElementById('m-label');
            hLabel.style.color = hColor;
            hLabel.style.textShadow = hGlow;
            mLabel.style.color = mColor;
            mLabel.style.textShadow = mGlow;
            document.querySelectorAll('.h-trail').forEach(el => { el.style.color = hColor; el.style.textShadow = trailShadow; });
            document.querySelectorAll('.m-trail').forEach(el => { el.style.color = mColor; el.style.textShadow = mTrailShadow; });
            // Dynamic hand colors — hour + minute only, second stays red
            applyHandColors(cp.edge, cp.center);
            if (window.rotH === undefined) {
                window.rotH = targetH;
                window.rotM = targetM;
                window.rotHT1 = targetH;
                window.rotHT2 = targetH;
                window.rotMT1 = targetM;
                window.rotMT2 = targetM;
            }
            function sweep(current, target, speed) {
                let diff = (target - current) % 360;
                // Normalize to [-180, 180] for shortest path
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;
                // Extremely tiny snap to prevent floating jitter at rest
                if (Math.abs(diff) < 0.01) return target;
                return current + diff * speed;
            }
            window.rotH = sweep(window.rotH, targetH, 0.008);
            window.rotM = sweep(window.rotM, targetM, 0.008);
            window.rotHT1 = sweep(window.rotHT1, targetH, 0.0065);
            window.rotHT2 = sweep(window.rotHT2, targetH, 0.005);
            window.rotMT1 = sweep(window.rotMT1, targetM, 0.0065);
            window.rotMT2 = sweep(window.rotMT2, targetM, 0.005);
            document.querySelector('.hand.hour').style.transform = `translateX(-50%) rotate(${window.rotH}deg)`;
            document.querySelector('.hand.minute').style.transform = `translateX(-50%) rotate(${window.rotM}deg)`;
            function updateLabel(id, rot, offset) {
                const rad = (rot - offset - 90) * Math.PI / 180;
                const x = Math.cos(rad) * RADIUS;
                const y = Math.sin(rad) * RADIUS;
                document.getElementById(id).style.transform = `translate3d(calc(-50% + ${x}vmin), calc(-50% + ${y}vmin), 0)`;
            }
            updateLabel('h-label', window.rotH, hOffset);
            updateLabel('h-trail-1', window.rotHT1, hOffset);
            updateLabel('h-trail-2', window.rotHT2, hOffset);
            updateLabel('m-label', window.rotM, mOffset);
            updateLabel('m-trail-1', window.rotMT1, mOffset);
            updateLabel('m-trail-2', window.rotMT2, mOffset);
            if (s !== lastSecond) {
                const diff = (s - lastSecond + 60) % 60;
                rotS += diff * 6;
                lastSecond = s;
                document.querySelector('.hand.second').style.transform = `translateX(-50%) rotate(${rotS}deg)`;
            }
            requestAnimationFrame(update);
        }
        // ─── Smooth Transition Constants ───
        const DWELL_MS = 3000;   // Wait at an hour
        const DRIFT_MS = 7000;   // Time for drift & shift
        const COLOR_DELAY = 1000; // Blend starts after drift trigger
        const demoSteps = [
            { h: 0.5, label: '12:30 AM' }, { h: 1.5, label: '1:30 AM' }, { h: 2.5, label: '2:30 AM' }, { h: 3.5, label: '3:30 AM' },
            { h: 4.5, label: '4:30 AM' }, { h: 5.5, label: '5:30 AM' }, { h: 6.5, label: '6:30 AM' }, { h: 7.5, label: '7:30 AM' },
            { h: 8.5, label: '8:30 AM' }, { h: 9.5, label: '9:30 AM' }, { h: 10.5, label: '10:30 AM' }, { h: 11.5, label: '11:30 AM' },
            { h: 12.5, label: '12:30 PM' }, { h: 13.5, label: '1:30 PM' }, { h: 14.5, label: '2:30 PM' }, { h: 15.5, label: '3:30 PM' },
            { h: 16.5, label: '4:30 PM' }, { h: 17.5, label: '5:30 PM' }, { h: 18.5, label: '6:30 PM' }, { h: 19.5, label: '7:30 PM' },
            { h: 20.5, label: '8:30 PM' }, { h: 21.5, label: '9:30 PM' }, { h: 22.5, label: '10:30 PM' }, { h: 23.5, label: '11:30 PM' }
        ];
        let demoStepIdx = 0;
        currentDemoH = demoSteps[0].h;
        window.isDemoActive = false;
        function applyDemoHour(h) {
            currentDemoH = h % 24;
            const idx = Math.floor(currentDemoH);
            const cp = timePalettes[idx];
            const np = timePalettes[(idx + 1) % 24];
            document.documentElement.style.setProperty('--face-center', cp.center);
            document.documentElement.style.setProperty('--face-edge', cp.edge);
            document.documentElement.style.setProperty('--current-accent', cp.text);
            document.documentElement.style.setProperty('--next-accent', np.text);
            document.documentElement.style.setProperty('--next-face', np.center);
        }
        function showDemoLabel(text) {
            const el = document.getElementById('demo-time-label');
            if (el) {
                el.textContent = text;
                el.style.opacity = '1';
            }
        }
        function hideDemoLabel() {
            const el = document.getElementById('demo-time-label');
            if (el) el.style.opacity = '0';
        }
        function triggerOneDrift() {
            const hAngle = Math.random() * Math.PI * 2;
            const newHTargetX = Math.cos(hAngle) * RADIUS;
            const newHTargetY = Math.sin(hAngle) * RADIUS;
            const mPos = getSafeXY(newHTargetX, newHTargetY);
            const bezel = document.getElementById('clock-bezel');
            // Both labels drift together
            bezel.classList.add('is-h-drifting', 'is-m-drifting');
            // Set targets slightly after the ghost starts
            setTimeout(() => {
                hTargetX = newHTargetX;
                hTargetY = newHTargetY;
                mTargetX = mPos.x;
                mTargetY = mPos.y;
            }, 100);
            // Hands arrive at ~6.5s in V7, so we clear the ghosting then
            setTimeout(() => {
                bezel.classList.remove('is-h-drifting', 'is-m-drifting');
            }, 7000);
        }
        function runDemoStep() {
            window.isDemoActive = true;
            document.body.classList.add('is-demo-active');
            const step = demoSteps[demoStepIdx];
            showDemoLabel(step.label);
            applyDemoHour(step.h);
            demoStepIdx = (demoStepIdx + 1) % demoSteps.length;
            setTimeout(runDemoStep, 10000); // Only cycle colors/labels every 10s
        }
        shiftReality();
        update();
        runDemoStep();
        // ─── Production: Independent Hour & Minute drifts ───
        // Dwell time (10-15s) happens AFTER the transition finishes.
    </script>
