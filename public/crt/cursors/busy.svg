<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Arrow on the left half (compressed slightly) -->
  <polygon points="2,2 2,18 6,15 9,22 11,21 8,14 14,14"
           fill="#ffffff" stroke="#000000" stroke-width="2" stroke-linejoin="miter"/>
  <!-- Small hourglass on the right of the arrow -->
  <g transform="translate(16,9)">
    <rect x="0"  y="0"  width="14" height="2" fill="#000000"/>
    <rect x="0"  y="14" width="14" height="2" fill="#000000"/>
    <polygon points="1,2 13,2 7,8 13,14 1,14 7,8" fill="#000000"/>
    <polygon points="3,3 11,3 7,7 11,13 3,13 7,9" fill="#ffffff"/>
    <polygon points="4,4 10,4 7,7" fill="#d6a86a"/>
    <polygon points="4,13 10,13 8,11 6,11" fill="#d6a86a"/>
  </g>
</svg>
