<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Document background -->
  <rect x="5" y="4" width="20" height="24" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <!-- Gear over the document -->
  <g transform="translate(16,18)" stroke="#000" stroke-width="1">
    <!-- 8 teeth -->
    <rect x="-2"  y="-12" width="4" height="3" fill="#86898d"/>
    <rect x="-2"  y="9"   width="4" height="3" fill="#86898d"/>
    <rect x="-12" y="-2"  width="3" height="4" fill="#86898d"/>
    <rect x="9"   y="-2"  width="3" height="4" fill="#86898d"/>
    <rect x="6"   y="-10" width="3" height="4" fill="#86898d" transform="rotate(45)"/>
    <rect x="-9"  y="-10" width="3" height="4" fill="#86898d" transform="rotate(-45)"/>
    <!-- Body -->
    <circle cx="0" cy="0" r="8" fill="#86898d"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
  </g>
</svg>
